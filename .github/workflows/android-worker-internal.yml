# Build & upload the NoQx Worker Android app to the Play Store internal track.
#
# Required GitHub repo secrets (separate from the student app's):
#   WORKER_ANDROID_KEYSTORE_BASE64   — upload keystore (.jks), base64-encoded
#   WORKER_ANDROID_KEYSTORE_PASSWORD — keystore password
#   WORKER_ANDROID_KEY_ALIAS         — key alias inside the keystore
#   WORKER_ANDROID_KEY_PASSWORD      — alias password
#   WORKER_PLAY_STORE_JSON_KEY       — Google service-account JSON for the Play Developer API
#
# Until these secrets are populated the workflow builds the AAB and
# uploads it as a CI artifact (downloadable for 14 days), but skips
# the Play Store push. That lets you smoke-test the build pipeline
# before going through the Play Console setup.
#
# Trigger: manual (workflow_dispatch) OR push to release/worker-1.0 OR worker-v* tags.

name: android-worker-internal

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which Railway env should the APK point at?"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    branches: ['release/worker-1.0']
    tags:     ['worker-v*']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      KEYSTORE_FILE:     upload.jks
      KEYSTORE_PASSWORD: ${{ secrets.WORKER_ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS:         ${{ secrets.WORKER_ANDROID_KEY_ALIAS }}
      KEY_PASSWORD:      ${{ secrets.WORKER_ANDROID_KEY_PASSWORD }}
      HAS_KEYSTORE:      ${{ secrets.WORKER_ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY_KEY:      ${{ secrets.WORKER_PLAY_STORE_JSON_KEY != '' }}
      TARGET_ENV: ${{ inputs.environment || (github.event_name == 'push' && 'production') || 'staging' }}
      # Worker starts on /worker/login (per capacitor.config.ts default).
      CAPACITOR_SERVER_URL: ${{ (inputs.environment == 'production' || github.event_name == 'push') && 'https://noqx.co.in/worker/login' || 'https://canteenapplication-staging.up.railway.app/worker/login' }}

    defaults:
      run:
        working-directory: mobile-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-worker/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Capacitor 8 requires JDK 21 (capacitor.build.gradle uses VERSION_21)
          java-version: '21'

      - name: Install Node dependencies
        run: npm ci

      # First-time: generate the android/ directory. Idempotent — no-op if it exists.
      - name: Add Android Capacitor platform
        run: npx cap add android || true

      # google-services.json is committed at mobile-worker/google-services.json
      # (public client config, safe to commit per Firebase docs). Copy into
      # the native android workspace AFTER `cap add` materialises the folder
      # but BEFORE `cap sync` so the Firebase Gradle plugin sees it on the
      # first build. Without this file, the Firebase SDK throws during
      # MainActivity.onCreate and the worker app crashes on launch.
      - name: Drop google-services.json into native workspace
        run: cp google-services.json android/app/google-services.json

      - name: Sync Capacitor assets + plugins
        run: npx cap sync android

      # Splash screen: still generated by @capacitor/assets (worker keeps blue
      # splash per scope). --no-icon skips icon generation so the launcher
      # icons come from the COPIED-OVER student-app brand assets below.
      - name: Generate splash screens
        run: npx @capacitor/assets generate --android --splashBackgroundColor '#2563eb' --splashBackgroundColorDark '#1e3a8a' --no-icon || true

      # Worker app shares the NoQx brand with the student app (same logo,
      # same icon background color, same adaptive XML). Copy the already-
      # correct, padded, safe-zone-aware launcher icons from the REPO-ROOT
      # student android workspace into the worker workspace. This bypasses
      # @capacitor/assets's icon generation (which produced a placeholder
      # blue-X because icon-only.png lacks the transparent-foreground +
      # separate-background split @capacitor/assets v3 requires for proper
      # adaptive-icon output).
      - name: Copy NoQx brand launcher icons from student workspace
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            src="android/app/src/main/res/mipmap-$density"
            dest="mobile-worker/android/app/src/main/res/mipmap-$density"
            mkdir -p "$dest"
            cp "$src/ic_launcher.png"            "$dest/ic_launcher.png"
            cp "$src/ic_launcher_round.png"      "$dest/ic_launcher_round.png"
            cp "$src/ic_launcher_foreground.png" "$dest/ic_launcher_foreground.png"
          done
          # Adaptive-icon XML (references @color/ic_launcher_background)
          mkdir -p mobile-worker/android/app/src/main/res/mipmap-anydpi-v26
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml \
             mobile-worker/android/app/src/main/res/mipmap-anydpi-v26/
          # Adaptive-icon background color resource — overwrite/insert
          mkdir -p mobile-worker/android/app/src/main/res/values
          cp android/app/src/main/res/values/colors.xml \
             mobile-worker/android/app/src/main/res/values/colors.xml
          echo "✓ Copied NoQx launcher icons + adaptive XML + background color"

      # Force Kotlin stdlib 1.8.22 to resolve duplicate-class errors between
      # 1.6.21 jdk7/jdk8 stdlibs and 1.8.22 main stdlib. See android/build.gradle
      # in the student workspace for the same fix and full reasoning.
      - name: Force Kotlin stdlib version (avoid duplicate-class build error)
        working-directory: mobile-worker/android
        run: |
          if ! grep -q "kotlin-stdlib:1.8.22" build.gradle; then
            python3 -c "
          import re
          p = open('build.gradle').read()
          inject = '''
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          '''
          # Insert before the closing brace of the 'allprojects {' block.
          p = re.sub(r'(allprojects \\{[^}]*?repositories \\{[^}]*?\\})\\s*(\\})', r'\1' + inject + r'\2', p, count=1, flags=re.DOTALL)
          open('build.gradle','w').write(p)
          "
            echo '✓ Kotlin stdlib 1.8.22 forced in mobile-worker/android/build.gradle'
          fi

      # Worker app scans QRs from inside the WebView via getUserMedia().
      # On Android, BridgeWebChromeClient only grants the WebView camera
      # access if the host AndroidManifest declares CAMERA. Without this
      # step the QR scanner page fails silently with a "permission denied".
      - name: Grant WebView camera access (CAMERA permission)
        working-directory: mobile-worker/android/app/src/main
        run: |
          if ! grep -q "android.permission.CAMERA" AndroidManifest.xml; then
            python3 -c "
          import re
          p = open('AndroidManifest.xml').read()
          inject = '    <uses-permission android:name=\"android.permission.CAMERA\" />\n    <uses-feature android:name=\"android.hardware.camera\" android:required=\"false\" />\n'
          p = re.sub(r'(\s*</manifest>)', inject + r'\1', p, count=1)
          open('AndroidManifest.xml','w').write(p)
          "
            echo "✓ CAMERA permission added to AndroidManifest"
          else
            echo "✓ CAMERA permission already present"
          fi

      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.WORKER_ANDROID_KEYSTORE_BASE64 }}
        continue-on-error: true
        run: |
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \r\n"\047' | base64 --decode > android/app/upload.jks
          if [ ! -s android/app/upload.jks ]; then
            echo "::warning::Decoded keystore is empty — WORKER_ANDROID_KEYSTORE_BASE64 is malformed."
            rm -f android/app/upload.jks
            exit 1
          fi
          if ! keytool -list -keystore android/app/upload.jks -storepass "${KEYSTORE_PASSWORD}" > /dev/null 2>&1; then
            echo "::warning::Worker keystore opened but keytool -list failed — BASE64/PASSWORD mismatch."
            rm -f android/app/upload.jks
            exit 1
          fi
          echo "✓ Keystore decoded and verified ($(stat -c%s android/app/upload.jks) bytes)"

      - name: Override HAS_KEYSTORE on decode failure
        if: env.HAS_KEYSTORE == 'true' && steps.decode_keystore.outcome == 'failure'
        run: |
          echo "HAS_KEYSTORE=false" >> "$GITHUB_ENV"
          echo "::warning::Falling back to UNSIGNED worker build because keystore decode failed."

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release AAB (signed if all 4 secrets work; auto-fallback to unsigned)
        working-directory: mobile-worker/android
        run: |
          set +e
          # See student workflow comment — AGP resolves store.file relative to
          # the app module, so we pass an absolute path. (Worker happens to work
          # with the relative form today because cap-add-ios generates a newer
          # AGP config; absolute is defensive consistency.)
          KEYSTORE_ABS_PATH="$(pwd)/app/upload.jks"
          if [ "${HAS_KEYSTORE}" = "true" ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file="${KEYSTORE_ABS_PATH}" \
              -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
              -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
              -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"
            STATUS=$?
            if [ $STATUS -eq 0 ]; then
              echo "✓ Signed worker AAB built"
              exit 0
            fi
            echo "::warning::Worker signed build failed (exit $STATUS). Falling back to UNSIGNED."
            rm -rf app/build/outputs/bundle/release
            echo "HAS_KEYSTORE=false" >> "$GITHUB_ENV"
          fi
          ./gradlew bundleRelease
          if [ "${HAS_KEYSTORE}" != "true" ]; then
            echo "::warning::Worker AAB built UNSIGNED. Populate WORKER_ANDROID_KEYSTORE_BASE64 + 3 sibling secrets to ship to Play Store."
          fi

      - name: Build debug APK (sideload-friendly)
        working-directory: mobile-worker/android
        run: ./gradlew assembleDebug

      # Unsigned and signed bundleRelease produce different filenames
      # (app-release-unsigned.aab vs app-release.aab); glob both.
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: noqx-worker-${{ env.TARGET_ENV }}-release.aab
          path: mobile-worker/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noqx-worker-${{ env.TARGET_ENV }}-debug.apk
          path: mobile-worker/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Publish to Play Store internal track
        if: env.HAS_KEYSTORE == 'true' && env.HAS_PLAY_KEY == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.WORKER_PLAY_STORE_JSON_KEY }}
          packageName:   com.noqx.worker
          releaseFiles:  mobile-worker/android/app/build/outputs/bundle/release/app-release.aab
          track:         internal
          status:        completed
