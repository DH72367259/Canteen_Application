# Build & upload the NoQx Student iOS app to TestFlight.
#
# Required GitHub repo secrets:
#   APP_STORE_CONNECT_API_KEY_ID    — Key ID from App Store Connect → Integrations → API Keys
#   APP_STORE_CONNECT_ISSUER_ID     — Issuer ID on the same page
#   APP_STORE_CONNECT_API_KEY       — .p8 file contents, base64-encoded
#   IOS_DIST_CERT_P12_BASE64        — distribution cert exported from Keychain (.p12), base64
#   IOS_DIST_CERT_PASSWORD          — password for that .p12
#   IOS_PROVISIONING_PROFILE_BASE64 — .mobileprovision for com.noqx.student, base64
#
# Trigger: manual (workflow_dispatch) OR push to release/1.0 OR version tags.
# The ios/ directory is generated fresh by `cap add ios` on CI because it
# requires CocoaPods which is available on macOS runners.

name: ios-testflight

on:
  workflow_dispatch:
  push:
    branches: ['release/1.0']
    tags:     ['v*']

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 75

    env:
      HAS_CERT:    ${{ secrets.IOS_DIST_CERT_P12_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
      HAS_ASC:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Add iOS Capacitor platform
        run: npx cap add ios || true   # idempotent — no-op if ios/ already exists

      # Apply the NoQx-specific scaffold overrides AFTER cap add ios generates
      # the base Xcode project. ios-overrides/ holds files we want to override
      # the Capacitor defaults with (Info.plist with our bundle ID, status-bar
      # config, brand-color launch screen, NoQx app icons). Done BEFORE cap sync
      # so sync picks up our values.
      - name: Apply ios-overrides/ on top of fresh Capacitor scaffold
        run: |
          if [ -d "ios-overrides" ] && [ -d "ios/App/App" ]; then
            cp ios-overrides/Info.plist ios/App/App/Info.plist
            mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
            cp -r ios-overrides/AppIcon.appiconset/* ios/App/App/Assets.xcassets/AppIcon.appiconset/
            echo "✓ Applied iOS overrides (Info.plist + AppIcon)"
          else
            echo "::warning::ios-overrides/ or ios/App/App not found — skipping override step"
          fi

      # Capacitor 8.3.1's iOS pod spec requires deployment target ≥15.0
      # (verified by reading node_modules/@capacitor/ios/Capacitor.podspec).
      # The default Podfile generated by `cap add ios` pins to 13.0/14.0
      # and pod install fails with "Specs satisfying the dependency required
      # a higher minimum deployment target". Force-bump before pod install.
      - name: Bump iOS deployment target to 15.0 (Podfile + Xcode project)
        working-directory: ios/App
        run: |
          if [ -f "Podfile" ]; then
            python3 -c "
          import re
          p = open('Podfile').read()
          p = re.sub(r\"platform\s*:ios,\s*'?[\\d.]+'?\", \"platform :ios, '15.0'\", p, count=1)
          open('Podfile','w').write(p)
          "
            echo '✓ Podfile platform pinned to iOS 15.0'
            grep "platform" Podfile | head -3
          else
            echo "::warning::Podfile not found in ios/App"
          fi
          # The Xcode project's own IPHONEOS_DEPLOYMENT_TARGET is independent
          # of Podfile platform. Both must be ≥15.0 or the app fails to link
          # against the Capacitor framework at compile time.
          if [ -f "App.xcodeproj/project.pbxproj" ]; then
            python3 -c "
          import re
          p = open('App.xcodeproj/project.pbxproj').read()
          before = p.count('IPHONEOS_DEPLOYMENT_TARGET')
          p = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET\s*=\s*[\\d.]+;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;', p)
          open('App.xcodeproj/project.pbxproj','w').write(p)
          print(f'  patched {before} IPHONEOS_DEPLOYMENT_TARGET entries')
          "
            echo '✓ App.xcodeproj/project.pbxproj IPHONEOS_DEPLOYMENT_TARGET pinned to 15.0'
          fi

      - name: Sync Capacitor assets + plugins
        run: npx cap sync ios

      - name: Install iOS pod dependencies
        working-directory: ios/App
        run: pod install

      # ── Code signing ────────────────────────────────────────────────────────
      - name: Import distribution certificate
        if: env.HAS_CERT == 'true'
        env:
          P12_BASE64:   ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/dist.p12
          security create-keychain -p ""         build.keychain
          security default-keychain -s           build.keychain
          security unlock-keychain   -p ""       build.keychain
          security import /tmp/dist.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        if: env.HAS_PROFILE == 'true'
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/noqx-student.mobileprovision

      # ── Build ────────────────────────────────────────────────────────────────
      # If we have BOTH cert + profile + team ID: do a real signed archive
      # ready for App Store. Otherwise just run an unsigned build to verify
      # the project compiles — no .ipa artifact in that case, but the run
      # succeeds and we know Capacitor + our config produce buildable code.
      - name: Build & archive (signed) OR compile-check (unsigned)
        working-directory: ios/App
        shell: bash {0}
        run: |
          if [ "${HAS_CERT}" = "true" ] && [ "${HAS_PROFILE}" = "true" ] && [ -n "${{ secrets.IOS_TEAM_ID }}" ]; then
            echo "→ Signed archive path"
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -archivePath build/NoQxStudent.xcarchive \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
              archive
          else
            echo "::warning::No iOS signing material in repo secrets — running unsigned compile check only. No .ipa will be produced. Populate IOS_DIST_CERT_P12_BASE64 + IOS_PROVISIONING_PROFILE_BASE64 + IOS_TEAM_ID to ship."
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -derivedDataPath build/compile-check \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              clean build
          fi

      - name: Export IPA
        if: env.HAS_CERT == 'true' && env.HAS_PROFILE == 'true'
        working-directory: ios/App
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict></plist>
          PLIST
          xcodebuild \
            -exportArchive \
            -archivePath build/NoQxStudent.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA artifact
        if: env.HAS_CERT == 'true' && env.HAS_PROFILE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: noqx-student.ipa
          path: ios/App/build/ipa/*.ipa
          retention-days: 14

      # ── TestFlight upload ─────────────────────────────────────────────────────
      - name: Upload to TestFlight
        if: env.HAS_ASC == 'true'
        env:
          API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_B64:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          xcrun altool \
            --upload-app \
            -f ios/App/build/ipa/App.ipa \
            -t ios \
            --apiKey    "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
