name: Nightly DB Backup

# Runs nightly at 02:30 UTC (08:00 IST) — well after the 23:00 IST dinner
# cutoff so the dump is consistent. Also exposed as workflow_dispatch so
# you can trigger an ad-hoc backup before risky migrations.
on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # pg_dump v16 — must match (or exceed) the Supabase Postgres major.
      - name: Install pg_dump 16
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
          pg_dump --version

      - name: Run backup
        env:
          DATABASE_URL:           ${{ secrets.BACKUP_DATABASE_URL }}
          S3_ENDPOINT:            ${{ secrets.BACKUP_S3_ENDPOINT }}
          S3_REGION:              ${{ secrets.BACKUP_S3_REGION }}
          S3_BUCKET:              ${{ secrets.BACKUP_S3_BUCKET }}
          S3_ACCESS_KEY_ID:       ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY:   ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          BACKUP_RETENTION_DAYS:  "400"
        run: node scripts/backup_to_s3.mjs
