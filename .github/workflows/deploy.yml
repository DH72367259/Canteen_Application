name: Deploy to Railway

# Deploy on every push to main (CI runs in parallel for visibility).
# workflow_dispatch keeps the manual escape hatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway auth
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Token length: ${#RAILWAY_TOKEN}"
          railway whoami || echo "whoami failed"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach \
            --project "9ecacfbc-a63e-4962-b2e7-69565b15b131" \
            --environment "589f6d0e-7ae1-4cc1-8546-94050d099009"

