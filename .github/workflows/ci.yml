name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run CI on"
        required: false
        default: "dev"

# ─────────────────────────────────────────────────────────────────────────────
# Resolve which branch to test.
# For pull_request events  → uses the PR source branch (github.head_ref).
# For push events          → uses the pushed branch (github.ref_name).
# For workflow_dispatch    → uses the input, defaulting to "dev".
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  resolve-branches:
    name: Resolve target branches
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ inputs.branch || 'dev' }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          echo "matrix={\"branch\":[\"$BRANCH\"]}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — TypeScript type-check (runs on every trigger)
# ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check (${{ matrix.branch }})
    needs: resolve-branches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-branches.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate next-env.d.ts
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: TypeScript type check
        run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Backend unit tests (runs on every trigger, all mocked — no live
#          Supabase needed)
# ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Unit Tests (${{ matrix.branch }})
    needs: resolve-branches
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-branches.outputs.matrix) }}

    env:
      NEXT_PUBLIC_SUPABASE_URL:      https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY:     placeholder-service-role-key
      NEXT_PUBLIC_APP_URL:           http://localhost:3000

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci --forceExit --passWithNoTests

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — E2E browser tests against the STAGING Railway deployment.
#
# Skipped on pull_request events — E2E only runs on a direct push to dev
# (and on workflow_dispatch). This prevents CI from hammering staging on
# every PR open/sync while still giving a full E2E gate after every merge
# into dev.
#
# Uses the "staging" GitHub Environment so that all secrets here resolve to
# the staging Supabase project and the staging Railway service — production
# is never touched by CI.
# ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Browser Tests (${{ matrix.branch }})
    if: github.event_name != 'pull_request'
    needs: resolve-branches
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-branches.outputs.matrix) }}

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve Railway deployment URL
        env:
          RAILWAY_TOKEN:          ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID:     ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          FALLBACK_APP_URL:       ${{ secrets.APP_URL }}
        run: |
          APP_BASE_URL=$(node scripts/get-railway-url.mjs)
          echo "APP_BASE_URL=$APP_BASE_URL" >> "$GITHUB_ENV"
          echo "  Targeting: $APP_BASE_URL"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers + OS deps
        run: npx playwright install chromium --with-deps

      - name: Write .env.local for cleanup scripts
        run: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n'      "$NEXT_PUBLIC_SUPABASE_URL"      >> .env.local
          printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.local
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n'     "$SUPABASE_SERVICE_ROLE_KEY"     >> .env.local
          printf 'APP_BASE_URL=%s\n'                  "$APP_BASE_URL"                  >> .env.local

      - name: Reset E2E database
        run: node scripts/cleanup-db-deep.mjs
        continue-on-error: true

      - name: Run E2E tests
        run: npx playwright test

      - name: Clean up E2E data
        if: always()
        run: node scripts/cleanup-complete.mjs
        continue-on-error: true

      - name: Sanitise branch name for artifact
        if: failure()
        id: safe-branch
        run: echo "name=$(echo '${{ matrix.branch }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ steps.safe-branch.outputs.name }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
