name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Names must match exactly what _helpers.ts reads from process.env
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # helpers.ts: APP_URL = process.env.APP_BASE_URL
      # Add secret "APP_URL" in GitHub → Settings → Secrets → Actions
      # Value: your Railway deployment URL, e.g. https://canteen-app.up.railway.app
      APP_BASE_URL:                  ${{ secrets.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers + OS deps
        run: npx playwright install chromium --with-deps

      - name: Write .env.local for cleanup scripts
        run: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n'      "$NEXT_PUBLIC_SUPABASE_URL"      >> .env.local
          printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.local
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n'     "$SUPABASE_SERVICE_ROLE_KEY"     >> .env.local
          printf 'APP_BASE_URL=%s\n'                  "$APP_BASE_URL"                  >> .env.local

      - name: Reset E2E database
        run: node scripts/cleanup-db-deep.mjs
        continue-on-error: true

      - name: Run E2E tests
        run: npx playwright test

      - name: Clean up E2E data
        if: always()
        run: node scripts/cleanup-complete.mjs
        continue-on-error: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
