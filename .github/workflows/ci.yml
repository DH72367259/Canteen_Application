name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — TypeScript type-check (fast, no secrets needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate next-env.d.ts
        # next-env.d.ts is gitignored but tsc needs it to resolve Next.js types.
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: TypeScript type check
        run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Backend unit tests (Jest, all mocked — no live Supabase needed)
# ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Unit tests mock Supabase, but modules reference these vars at import
      # time — placeholder values prevent module-load errors.
      NEXT_PUBLIC_SUPABASE_URL:      https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY:     placeholder-service-role-key
      NEXT_PUBLIC_APP_URL:           http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci --forceExit --passWithNoTests

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — E2E browser tests (Playwright against the deployed Railway app)
# ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve Railway deployment URL
        # Queries the Railway GraphQL API with existing RAILWAY_* secrets to
        # get the live deployment domain — no APP_URL secret needed.
        run: |
          DOMAIN=$(curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { service(id: \\\"${{ secrets.RAILWAY_SERVICE_ID }}\\\") { domains { serviceDomains { domain } } } }\"}" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
domains = d.get('data',{}).get('service',{}).get('domains',{}).get('serviceDomains',[])
if domains: print(domains[0]['domain'])
" 2>/dev/null || echo "")
          if [ -n "$DOMAIN" ]; then
            echo "APP_BASE_URL=https://$DOMAIN" >> "$GITHUB_ENV"
            echo "  Resolved: https://$DOMAIN"
          else
            echo "  Warning: could not resolve Railway domain; tests will target localhost"
            echo "APP_BASE_URL=http://localhost:3000" >> "$GITHUB_ENV"
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers + OS deps
        run: npx playwright install chromium --with-deps

      - name: Write .env.local for cleanup scripts
        # cleanup-db-deep.mjs and cleanup-complete.mjs read .env.local directly
        run: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n'      "$NEXT_PUBLIC_SUPABASE_URL"      >> .env.local
          printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.local
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n'     "$SUPABASE_SERVICE_ROLE_KEY"     >> .env.local
          printf 'APP_BASE_URL=%s\n'                  "$APP_BASE_URL"                  >> .env.local

      - name: Reset E2E database
        run: node scripts/cleanup-db-deep.mjs
        continue-on-error: true

      - name: Run E2E tests
        run: npx playwright test

      - name: Clean up E2E data
        if: always()
        run: node scripts/cleanup-complete.mjs
        continue-on-error: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
