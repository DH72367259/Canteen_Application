# Build & upload the NoQx Student Android app to the Play Store internal track.
#
# Required GitHub repo secrets:
#   ANDROID_KEYSTORE_BASE64   — upload keystore (.jks), base64-encoded
#   ANDROID_KEYSTORE_PASSWORD — keystore password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — alias password
#   PLAY_STORE_JSON_KEY       — Google service-account JSON for the Play Developer API
#
# Trigger: manual (workflow_dispatch) OR push to release/1.0 OR version tags.
# Until secrets are populated the build runs but skips the Play Store upload.

name: android-internal

on:
  workflow_dispatch:
  push:
    branches: ['release/1.0']
    tags:     ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      KEYSTORE_FILE:     upload.jks
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
      HAS_KEYSTORE:      ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY_KEY:      ${{ secrets.PLAY_STORE_JSON_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # android/ directory is already committed; just sync assets & config
      - name: Sync Capacitor assets
        run: npx cap sync android

      # Decode and place the upload keystore (only if the secret is set)
      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload.jks

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/upload.jks \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: noqx-student-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      # Only publish to Play Store when both secrets are populated
      - name: Publish to Play Store internal track
        if: env.HAS_KEYSTORE == 'true' && env.HAS_PLAY_KEY == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName:   com.noqx.student
          releaseFiles:  android/app/build/outputs/bundle/release/app-release.aab
          track:         internal
          status:        completed
          whatsNewDirectory: distribution/whatsnew
