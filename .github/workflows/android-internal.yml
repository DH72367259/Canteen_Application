# Build & upload the NoQx Student Android app to the Play Store internal track.
#
# Required GitHub repo secrets:
#   ANDROID_KEYSTORE_BASE64   — upload keystore (.jks), base64-encoded
#   ANDROID_KEYSTORE_PASSWORD — keystore password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — alias password
#   PLAY_STORE_JSON_KEY       — Google service-account JSON for the Play Developer API
#
# Trigger: manual (workflow_dispatch) OR push to release/1.0 OR version tags.
# Until secrets are populated the build runs but skips the Play Store upload.

name: android-internal

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which Railway env should the APK point at?"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    branches: ['release/1.0']
    tags:     ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      KEYSTORE_FILE:     upload.jks
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
      HAS_KEYSTORE:      ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY_KEY:      ${{ secrets.PLAY_STORE_JSON_KEY != '' }}
      # tag/release pushes default to production; workflow_dispatch honors the
      # `environment` input (default: staging). The Capacitor config reads
      # CAPACITOR_SERVER_URL during `cap sync`, so this single env var swaps
      # whether the resulting APK loads staging or production.
      TARGET_ENV: ${{ inputs.environment || (github.event_name == 'push' && 'production') || 'staging' }}
      CAPACITOR_SERVER_URL: ${{ (inputs.environment == 'production' || github.event_name == 'push') && 'https://noqx.co.in' || 'https://canteenapplication-staging.up.railway.app' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Capacitor 8 generates capacitor.build.gradle with sourceCompatibility
          # VERSION_21, so the runner JDK must be ≥21 even though our own
          # build.gradle still targets 17.
          java-version: '21'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # android/ directory is already committed; just sync assets & config
      - name: Sync Capacitor assets
        run: npx cap sync android

      # Decode and place the upload keystore (only if the secret is set)
      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        continue-on-error: true
        run: |
          # Tolerate base64 that has line wrapping, trailing whitespace, or
          # was pasted with surrounding quotes — common GitHub-secret pitfalls.
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \r\n"\047' | base64 --decode > android/app/upload.jks
          if [ ! -s android/app/upload.jks ]; then
            echo "::warning::Decoded keystore is empty — the ANDROID_KEYSTORE_BASE64 secret is malformed."
            rm -f android/app/upload.jks
            exit 1
          fi
          # Decisive validity check: can keytool actually open it with the
          # provided password? If not, the secret pair (BASE64 + PASSWORD)
          # is mismatched or corrupt and signing WILL fail anyway. Better
          # to detect now and fall back to unsigned than fail mid-build.
          if ! keytool -list -keystore android/app/upload.jks -storepass "${KEYSTORE_PASSWORD}" > /dev/null 2>&1; then
            echo "::warning::Keystore opened but keytool -list failed — BASE64/PASSWORD mismatch or corrupt store."
            rm -f android/app/upload.jks
            exit 1
          fi
          echo "✓ Keystore decoded and verified ($(stat -c%s android/app/upload.jks) bytes)"

      # Re-export HAS_KEYSTORE as false if decode failed, so subsequent
      # build/publish steps fall back to unsigned cleanly.
      - name: Override HAS_KEYSTORE on decode failure
        if: env.HAS_KEYSTORE == 'true' && steps.decode_keystore.outcome == 'failure'
        run: |
          echo "HAS_KEYSTORE=false" >> "$GITHUB_ENV"
          echo "::warning::Falling back to UNSIGNED build because keystore decode failed. Fix ANDROID_KEYSTORE_BASE64 to ship to Play Store."

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release AAB (signed if all 4 secrets work; auto-fallback to unsigned)
        working-directory: android
        shell: bash {0}    # disable default `set -e -o pipefail`; we handle errors explicitly below
        run: |
          SIGNED=0
          # IMPORTANT: AGP resolves -Pandroid.injected.signing.store.file
          # relative to the APP MODULE root (android/app/), not the project
          # root. Using a relative path like `app/upload.jks` would resolve
          # to `android/app/app/upload.jks` and fail. Use an absolute path.
          KEYSTORE_ABS_PATH="$(pwd)/app/upload.jks"
          if [ "${HAS_KEYSTORE}" = "true" ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file="${KEYSTORE_ABS_PATH}" \
              -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
              -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
              -Pandroid.injected.signing.key.password="${KEY_PASSWORD}" \
              && SIGNED=1
            if [ $SIGNED -eq 1 ]; then
              echo "✓ Signed AAB built"
              exit 0
            fi
            echo "::warning::Signed build failed — most likely the existing 2026-05-13 ANDROID_KEY_PASSWORD doesn't match the keystore. Rebuilding UNSIGNED."
            rm -rf app/build/outputs/bundle/release
          fi
          # Unsigned fallback (or HAS_KEYSTORE was false to begin with).
          # Force the build by clearing the signing config so Gradle doesn't fail
          # demanding one. `-PnoSign=true` is a marker for build.gradle to skip
          # signing if it's present; in plain Capacitor projects it's a no-op.
          ./gradlew bundleRelease -x signReleaseBundle || ./gradlew bundleRelease
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "::warning::Unsigned bundleRelease also failed (exit $STATUS). The .aab artifact will be missing."
            # Don't fail the whole job — the debug .apk is still useful for sideloading
            exit 0
          fi
          echo "::warning::Student AAB built UNSIGNED. Populate ANDROID_KEYSTORE_BASE64 + 3 sibling secrets to ship to Play Store."

      - name: Build debug APK (sideload-friendly)
        working-directory: android
        run: ./gradlew assembleDebug

      # Unsigned bundleRelease produces app-release-unsigned.aab; signed
      # builds produce app-release.aab. Glob both so the artifact is uploaded
      # whichever path the build took. if-no-files-found: warn = the run
      # still passes if AAB generation itself failed.
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: noqx-student-${{ env.TARGET_ENV }}-release.aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noqx-student-${{ env.TARGET_ENV }}-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # Only publish to Play Store when both secrets are populated
      - name: Publish to Play Store internal track
        if: env.HAS_KEYSTORE == 'true' && env.HAS_PLAY_KEY == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName:   com.noqx.student
          releaseFiles:  android/app/build/outputs/bundle/release/app-release.aab
          track:         internal
          status:        completed
          whatsNewDirectory: distribution/whatsnew
