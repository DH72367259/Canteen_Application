# Nixpacks config for Railway deployment

[phases.install]
cmds = ["npm ci"]

[phases.build]
# `npm run build` triggers the `postbuild` script in package.json which
# already copies static + public into the standalone bundle. Do not repeat
# those cp commands here — running them twice nests static/static and can
# wedge the Railway build phase.
cmds = ["npm run build"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
